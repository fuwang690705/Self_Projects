services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./.env.production
    expose:
      - "3001"
    volumes:
      - backend_data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.server
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:18080:80"

volumes:
  backend_data:
